name: "Framework CI"

on:
  push:
    branches: [main, "drook/*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate framework templates
        run: python scripts/validate_templates.py

      - name: Run confidentiality scan
        run: python scripts/confidentiality_scan.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run framework tests
        run: pytest tests/ -v
