name: Framework CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  pytest:
    name: Run pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest

      - name: Run pytest
        run: |
          if find . -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            python -m pytest -v
          else
            echo "No test files found -- skipping pytest."
          fi

  confidentiality_scan:
    name: Confidentiality scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run confidentiality scanner
        run: python scripts/confidentiality_scan.py .

  validate_spec_appendix:
    name: Validate SPEC.md Appendix A
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate spec appendix
        run: python scripts/validate_spec_appendix.py

  skill_test_static:
    name: Skill test (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Placeholder for skill-test static
        run: echo "Skill test runner not yet implemented -- placeholder for /skill-test static all"
