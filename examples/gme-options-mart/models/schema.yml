version: 2

models:
  - name: gme_ods_cboe_options_chain
    description: Raw GME options chain ingested from Yahoo Finance via yfinance
    columns:
      - name: pull_date
        tests:
          - not_null
      - name: option_symbol
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
          - accepted_values:
              values: ['GME']
      - name: strike
        tests:
          - not_null
      - name: provider
        tests:
          - not_null
          - accepted_values:
              values: ['yahoo_finance']
      - name: pull_ts_utc
        tests:
          - not_null
      - name: quote_ts_utc
        tests:
          - not_null
      - name: run_id
        tests:
          - not_null

  - name: gme_dim_date
    description: Calendar dimension from seed
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null
      - name: is_trading_day
        tests:
          - not_null

  - name: gme_dwd_option_contract_di
    description: Cleaned options facts with computed Greeks and GEX
    columns:
      - name: pull_date
        tests:
          - not_null
      - name: option_symbol
        tests:
          - not_null
      - name: strike
        tests:
          - not_null
      - name: option_type
        tests:
          - not_null
          - accepted_values:
              values: ['call', 'put']
      - name: open_interest
        tests:
          - not_null
      - name: gex_contribution
        tests:
          - not_null
      - name: series_type
        tests:
          - not_null
          - accepted_values:
              values: ['WEEKLY', 'MONTHLY', 'LEAP']
      - name: expiry
        tests:
          - not_null

  - name: gme_dws_strike_gex_1d
    description: GEX by strike (Black-Scholes gamma)
    columns:
      - name: pull_date
        tests:
          - not_null
      - name: strike
        tests:
          - not_null
      - name: net_gex
        tests:
          - not_null
      - name: gex_rank
        tests:
          - not_null

  - name: gme_dws_daily_snapshot_1d
    description: Daily market summary — spot, max pain, P/C ratio, net GEX, top OI strikes
    columns:
      - name: pull_date
        tests:
          - unique
          - not_null
      - name: spot
        tests:
          - not_null
      - name: pc_ratio
        tests:
          - not_null

  - name: gme_dws_options_metrics_1d
    description: IV30, HV20, IV rank, IV percentile, dealer net gamma
    columns:
      - name: pull_date
        tests:
          - unique
          - not_null
      - name: ticker
        tests:
          - not_null
          - accepted_values:
              values: ['GME']
      - name: iv30
        tests:
          - not_null
      - name: dealer_net_gamma
        tests:
          - not_null
      - name: gamma_flip_point
        tests:
          - not_null

  - name: gme_ads_market_dashboard
    description: One-big-table joining DWS + DIM for dashboard consumption
    columns:
      - name: pull_date
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('gme_dim_date')
              field: full_date
      - name: ticker
        tests:
          - not_null
      - name: spot
        tests:
          - not_null
      - name: iv30
        tests:
          - not_null
      - name: dealer_net_gamma
        tests:
          - not_null
      - name: gamma_flip_point
        tests:
          - not_null
