# mart.yml — manifest for the gme-options-mart canonical example.

mart_name: gme-options-mart
prefix: gme

# Phase tracking — updated by skills as they run.
# Round-2 iteration: artifacts redrafted after Phase A.5 reviewer
# verdict (comment 8bd7a35c, findings 1-12). Awaiting A.5 re-review
# before advancing to Phase B.
phase: A_draft

# Artifact paths (relative to this mart root, i.e. examples/gme-options-mart/).
source_catalog_path: docs/source_catalog.json
brd_path: docs/business-requirements.md
tdd_path: docs/tech-design-doc.md

# Sign-off flags.
brd_signed: false
tdd_signed: false

# Issue tracker binding (used by /linear if invoked from this mart).
