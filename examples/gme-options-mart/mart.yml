  provider: github
  project: your-mart-org/your-mart-repo

# Dashboard mode toggle.
dashboard:
  mode: fixture
  port: 8503

# Data refresh cadence — daily after US market close.
refresh:
  schedule: "30 21 * * 1-5"
  sla_hours: 2

last_run: null
