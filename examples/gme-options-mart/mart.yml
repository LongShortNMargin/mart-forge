mart:
  name: "gme-options-mart"
  prefix: "gme"
  grain: "daily"
  schedule: "daily"

providers:
  - name: "yahoo_finance"
    type: "api"
    endpoint: "https://finance.yahoo.com"
    auth_method: "none"

dqc:
  thresholds:
    freshness_hours: 24
    completeness_min_pct: 95
    null_rate_max_pct: 5
    volume_deviation_pct: 30

layers:
  ods:
    materialization: incremental
    incremental_strategy: delete+insert
    provenance_columns:
      - provider
      - pull_ts_utc
      - quote_ts_utc
      - run_id
  dim:
    materialization: table
    source: seeds
  dwd:
    materialization: incremental
    description: "Cleaned facts with Black-Scholes Greeks and GEX"
  dws:
    materialization: table
    description: "Aggregated metrics — GEX profile, daily snapshot, volatility"
  ads:
    materialization: table
    description: "Dashboard-ready one-big-table"
